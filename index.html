<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CONTROL RECOGIDAS</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">

    <!-- Librerías -->
    <script src="libs/xlsx.full.min.js"></script>
    <script src="libs/exceljs.min.js"></script>
    <script src="libs/fuse.min.js"></script>

</head>

<body>

<div class="container">

    <!-- ========================================================= -->
    <!-- CABECERA -->
    <!-- ========================================================= -->

    <header class="header">

        <div class="logo">

            <div class="truck">
                🚚
            </div>

            <div>

                <h1>CONTROL RECOGIDAS</h1>

                <p>
                    Gestión automática de palets diarios
                </p>

            </div>

        </div>

        <div class="version">

            v1.0.0

        </div>

    </header>


    <!-- ========================================================= -->
    <!-- TARJETA CLIENTES -->
    <!-- ========================================================= -->

    <section class="card">

        <h2>📄 EXCEL CLIENTES</h2>

        <input
            type="file"
            id="clientesFile"
            accept=".xlsx,.xls">

        <p id="clientesNombre">

            Ningún archivo seleccionado

        </p>

    </section>


    <!-- ========================================================= -->
    <!-- TARJETA EQUIVALENCIAS -->
    <!-- ========================================================= -->

    <section class="card">

        <h2>🔄 EXCEL EQUIVALENCIAS</h2>

        <input
            type="file"
            id="equivalenciasFile"
            accept=".xlsx,.xls">

        <p id="equivalenciasNombre">

            Ningún archivo seleccionado

        </p>

        <button
            id="crearEquivalencias">

            Crear archivo de equivalencias

        </button>

    </section>


    <!-- ========================================================= -->
    <!-- BOTÓN PROCESAR -->
    <!-- ========================================================= -->

    <section class="card center">

        <button
            id="procesarBtn"
            disabled>

            ▶ PROCESAR

        </button>

    </section>


    <!-- ========================================================= -->
    <!-- BARRA DE PROGRESO -->
    <!-- ========================================================= -->

    <section class="card">

        <h2>⚙ Estado del proceso</h2>

        <div class="progress">

            <div
                class="progress-bar"
                id="progressBar">

            </div>

        </div>

        <p id="estadoProceso">

            Esperando archivos...

        </p>

    </section>


    <!-- ========================================================= -->
    <!-- RESUMEN -->
    <!-- ========================================================= -->

    <section class="card">

        <h2>📊 Resumen</h2>

        <div class="summary">

            <div class="summary-box">

                <span>Clientes</span>

                <strong id="totalClientes">

                    0

                </strong>

            </div>

            <div class="summary-box">

                <span>Exactas</span>

                <strong id="exactas">

                    0

                </strong>

            </div>

            <div class="summary-box">

                <span>Fuzzy</span>

                <strong id="fuzzy">

                    0

                </strong>

            </div>

            <div class="summary-box">

                <span>Nuevos</span>

                <strong id="nuevos">

                    0

                </strong>

            </div>

        </div>

    </section>


    <!-- ========================================================= -->
    <!-- VISTA PREVIA -->
    <!-- ========================================================= -->

    <section class="card">

        <h2>📋 Vista previa</h2>

        <div
            id="previewContainer">

            <table id="previewTable">

                <thead></thead>

                <tbody></tbody>

            </table>

        </div>

    </section>


    <!-- ========================================================= -->
    <!-- DESCARGAS -->
    <!-- ========================================================= -->

    <section class="card center">

        <button
            id="descargarExcel"
            disabled>

            📥 Descargar Excel

        </button>

        <button
            id="descargarEquivalencias"
            disabled>

            📥 Descargar Equivalencias

        </button>

    </section>


</div>


<!-- ========================================================= -->
<!-- JAVASCRIPT -->
<!-- ========================================================= -->

<script src="js/storage.js"></script>
<script src="js/fuzzy.js"></script>
<script src="js/excel.js"></script>
<script src="js/export.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>

</html>
